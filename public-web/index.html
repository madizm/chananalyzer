<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChanAnalyzer Scan Results</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">ChanAnalyzer Public Board</p>
        <h1>缠论扫描结果</h1>
        <p class="subtitle">离线生成结果，公网只读展示，支持轻量点赞点踩。</p>
      </div>
      <div class="meta-card">
        <div class="meta-row">
          <span>数据版本</span>
          <strong id="manifest-version">-</strong>
        </div>
        <div class="meta-row">
          <span>生成时间</span>
          <strong id="manifest-time">-</strong>
        </div>
      </div>
    </header>

    <section class="panel filter-panel">
      <div class="panel-header filter-header">
        <div>
          <h2>前端过滤</h2>
          <p class="panel-meta">信号日期按区间过滤，成交额单位为亿元，换手率单位为 %。</p>
        </div>
        <button id="filter-reset" class="secondary-btn" type="button">重置</button>
      </div>
      <div class="filter-grid">
        <label class="filter-field">
          <span>信号日期开始</span>
          <input id="filter-signal-date-from" type="date">
        </label>
        <label class="filter-field">
          <span>信号日期结束</span>
          <input id="filter-signal-date-to" type="date">
        </label>
        <label class="filter-field">
          <span>成交额最小（亿元）</span>
          <input id="filter-amount-min" type="number" min="0" step="0.01" placeholder="例如 1.50">
        </label>
        <label class="filter-field">
          <span>成交额最大（亿元）</span>
          <input id="filter-amount-max" type="number" min="0" step="0.01" placeholder="例如 20.00">
        </label>
        <label class="filter-field">
          <span>换手率最小（%）</span>
          <input id="filter-turnover-min" type="number" min="0" step="0.01" placeholder="例如 2.00">
        </label>
        <label class="filter-field">
          <span>换手率最大（%）</span>
          <input id="filter-turnover-max" type="number" min="0" step="0.01" placeholder="例如 10.00">
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>买点结果</h2>
          <p id="buy-cache-time" class="panel-meta">每日更新一次</p>
        </div>
        <strong id="buy-count">0</strong>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代码</th>
              <th>名称</th>
              <th>行业</th>
              <th>现价</th>
              <th>成交额（亿元）</th>
              <th>换手率</th>
              <th>最新信号</th>
              <th>信号日期</th>
              <th>反馈</th>
            </tr>
          </thead>
          <tbody id="buy-table-body">
            <tr><td colspan="9" class="empty">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>卖点结果</h2>
          <p id="sell-cache-time" class="panel-meta">每日更新一次</p>
        </div>
        <strong id="sell-count">0</strong>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代码</th>
              <th>名称</th>
              <th>行业</th>
              <th>现价</th>
              <th>成交额（亿元）</th>
              <th>换手率</th>
              <th>最新信号</th>
              <th>信号日期</th>
              <th>反馈</th>
            </tr>
          </thead>
          <tbody id="sell-table-body">
            <tr><td colspan="9" class="empty">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./assets/config.js"></script>
  <script src="./assets/feedback.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
